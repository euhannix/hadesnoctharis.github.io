document.querySelectorAll(".menu a").forEach(link => {
    link.addEventListener("click", () => {
        const id = link.getAttribute("data-panel");
        const painel = document.getElementById(id);

        if (!painel) return;

        document.body.classList.add("menu-open");

        document.querySelectorAll(".panel").forEach(p => {
            p.classList.remove("active");
        });

        painel.classList.add("active");
        painel.scrollTop = 0;

        requestAnimationFrame(() => {
            painel.style.transform = "translateX(0)";
        });
    });
});

function closePanel(){
    document.body.classList.remove("menu-open");
    document.querySelectorAll(".panel").forEach(p => {
        p.classList.remove("active");
    });
}

function verificarEnigma() {
    const resposta = document.getElementById("enigma-input").value.trim().toLowerCase();
    const resultado = document.getElementById("resultado-enigma");

    if (resposta === "sombra") {
        resultado.innerText = "✔ correto.";
        resultado.style.color = "#7a0000";
        document.getElementById("enigma-box").style.display = "none";
        
        document.getElementById("conteudo-calcanhar").style.display = "block";
    } else {
        resultado.innerText = "✖ incorreto.";
        resultado.style.color = "white";
    }
}
